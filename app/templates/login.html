<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - TRZ FUNCIONAL</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
   /* Labels */
  .form-label{
    color: #5D2853 !important;
    font-weight: 700;
  }

  /* Inputs */
  .form-control{
    background: rgba(255,255,255,.06) !important;
    border: 1px solid rgba(255,255,255,.14) !important;
    color: #f1f3f5 !important;
  }
  .form-control:focus{
    border-color:#B54F99 !important;
    box-shadow: 0 0 0 .2rem rgba(181,79,153,.18) !important;
  }

  /* ✅ Botón Entrar (TRZ) */
  .btn-primary{
    background: #B54F99 !important;
    border-color: #B54F99 !important;
    color: #ffffff !important;
    font-weight: 800;
    letter-spacing: .3px;
  }
  .btn-primary:hover{
    background: #A0448D !important;
    border-color: #A0448D !important;
    color: #ffffff !important;
  }

  /* ✅ Link "Olvidaste" igual que labels */
  a.text-decoration-none{
    color: #5D2853 !important;
    font-weight: 700;
  }
  a.text-decoration-none:hover{
    color: #B54F99 !important;
  }
</style>
</head>
<body style="background:#1F2328; color:#f1f3f5;">
  <div class="container" style="max-width:420px;">
    <div class="card shadow-sm mt-5" style="background: rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);">
      <div class="card-body p-4">

        <!-- ✅ LOGO -->
        <div class="text-center mb-3">
          <img
            src="/static/img/trz-logo.png"
            alt="TRZ Funcional"
            style="max-width: 300px; width: 85%; height: auto;"
          />
        </div>

      <!--h4 class="mb-3 text-center">Ingresar</h4-->

        {% if error %}
          <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
          <div class="mb-2">
            <label class="form-label">Email</label>
            <input class="form-control" name="email" type="email" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input class="form-control" name="password" type="password" required />
          </div>
          <button class="btn btn-primary w-100" type="submit">Entrar</button>
          <div class="mt-3 text-center">
            <a href="/forgot-password" class="text-decoration-none">¿Olvidaste tu contraseña?</a>
          </div>
        </form>

      </div>
    </div>
  </div>
</body>
</html>
