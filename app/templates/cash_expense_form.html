{% extends "base.html" %}
{% block content %}

<style>
  .wrap{max-width:860px;margin:0 auto;padding:18px}
  .card2{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);border-radius:20px;overflow:hidden}
  .body{padding:20px}
  .foot{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}
  .ttl{font-size:34px;font-weight:900;margin:0}
  .sub{opacity:.74;margin-top:6px}
  .lbl{font-size:12px;letter-spacing:.08em;text-transform:uppercase;opacity:.78;margin:0 0 8px}
  .inp,.sel,.ta{width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.10);background:#2a2f36;color:#fff}
  .ta{min-height:100px;resize:vertical}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media (max-width: 760px){.grid2{grid-template-columns:1fr}}
</style>

<div class="wrap">
  <div style="margin-bottom:18px">
    <h1 class="ttl">Nuevo egreso</h1>
    <div class="sub">Registrá gastos, compras de insumos, mantenimiento y otros egresos.</div>
  </div>

  {% if not open_session %}
    <div class="alert alert-danger">No hay una caja abierta. Primero abrí la caja para registrar egresos.</div>
  {% endif %}

  <form method="post" action="/admin/caja/expense/new">
    <div class="card2">
      <div class="body">
        <div class="mb-3">
          <label class="lbl">Concepto</label>
          <input class="inp" type="text" name="concept" required placeholder="Ej: Compra de insumos de limpieza">
        </div>

        <div class="grid2">
          <div>
            <label class="lbl">Importe</label>
            <input class="inp" type="number" step="0.01" min="0.01" name="amount" required placeholder="Ej: 12500">
          </div>

          <div>
            <label class="lbl">Categoría</label>
            <select class="sel" name="category" required>
              {% for c in categories %}
                <option value="{{ c.value }}">{{ c.value }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="grid2 mt-3">
          <div>
            <label class="lbl">Método de pago</label>
            <select class="sel" name="payment_method">
              <option value="">(sin especificar)</option>
              {% for pm in payment_methods %}
                <option value="{{ pm.value }}">{{ pm.value }}</option>
              {% endfor %}
            </select>
          </div>

          <div>
            <label class="lbl">Fecha</label>
            <input class="inp" type="date" name="movement_date">
          </div>
        </div>

        <div class="grid2 mt-3">
          <div>
            <label class="lbl">Hora</label>
            <input class="inp" type="time" name="movement_time" value="09:00">
          </div>

          <div></div>
        </div>

        <div class="mt-3">
          <label class="lbl">Observaciones</label>
          <textarea class="ta" name="notes" placeholder="Detalle opcional del egreso..."></textarea>
        </div>
      </div>

      <div class="foot">
        <a class="btn btn-outline-secondary" href="/admin/caja">Volver</a>
        <button class="btn btn-primary" type="submit" {% if not open_session %}disabled{% endif %}>Guardar egreso</button>
      </div>
    </div>
  </form>
</div>

{% endblock %}
