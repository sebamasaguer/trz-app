{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm" style="max-width:640px;">
  <div class="card-body">
    <h4 class="mb-2">Cambiar contraseña</h4>
    <div class="text-muted mb-3">
      Usuario: <b>{{ me.email }}</b>
      {% if me.must_change_password %}
        <span class="badge bg-warning text-dark ms-2">Requerido</span>
      {% endif %}
    </div>

    {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}
    {% if ok %}
      <div class="alert alert-success py-2">{{ ok }}</div>
      <a class="btn btn-primary" href="{% if me.role.value in ['ADMINISTRADOR','ADMINISTRATIVO'] %}/admin/users{% elif me.role.value=='PROFESOR' %}/profesor{% else %}/alumno{% endif %}">
        Ir al panel
      </a>
    {% else %}
      <form method="post" action="/change-password">
        <div class="mb-3">
          <label class="form-label">Nueva contraseña</label>
          <input class="form-control" type="password" name="new_password" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Confirmar nueva contraseña</label>
          <input class="form-control" type="password" name="confirm_password" required />
        </div>
        <button class="btn btn-primary" type="submit">Guardar contraseña</button>
      </form>
    {% endif %}
  </div>
</div>
{% endblock %}
