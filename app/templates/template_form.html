{% extends "base.html" %}
{% block content %}

<style>
  .wrap{max-width:980px;margin:0 auto;padding:18px}
  .hero{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:18px}
  .hero h1{font-size:34px;font-weight:900;margin:0}
  .hero .sub{opacity:.74;margin-top:6px}
  .cardx{
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.04);
    border-radius:20px;
    padding:18px;
  }
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  @media (max-width: 900px){
    .grid{grid-template-columns:1fr}
  }
  .full{grid-column:1/-1}
  .alertx{
    margin-bottom:14px;
    padding:12px 14px;
    border-radius:14px;
    border:1px solid rgba(220,53,69,.25);
    background:rgba(220,53,69,.12);
    color:#ffd7dc;
    font-weight:600;
  }
  .help{
    margin-top:8px;
    font-size:13px;
    opacity:.75;
  }
  .actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:18px;
  }
</style>

<div class="wrap">
  <div class="hero">
    <div>
      <h1>{% if row and row.id %}Editar plantilla{% else %}Nueva plantilla{% endif %}</h1>
      <div class="sub">Definí mensajes reutilizables por tipo y canal.</div>
    </div>

    <div class="actions">
      <a class="btn btn-outline-secondary" href="/admin/templates">Volver</a>
    </div>
  </div>

  <div class="cardx">
    {% if error %}
      <div class="alertx">{{ error }}</div>
    {% endif %}

    <form method="post" action="{% if row and row.id %}/admin/templates/{{ row.id }}/edit{% else %}/admin/templates/new{% endif %}">
      <div class="grid">
        <div>
          <label class="form-label">Nombre</label>
          <input
            class="form-control"
            type="text"
            name="name"
            value="{{ row.name if row else '' }}"
            required
          />
        </div>

        <div>
          <label class="form-label">Canal</label>
          <select class="form-select" name="channel" required>
            {% for item in channels %}
              <option value="{{ item }}" {% if row and row.channel and row.channel.value == item %}selected{% endif %}>
                {{ item }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label class="form-label">Tipo</label>
          <select class="form-select" name="kind" required>
            {% for item in kinds %}
              <option value="{{ item }}" {% if row and row.kind and row.kind.value == item %}selected{% endif %}>
                {{ item }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label class="form-label">Activa</label>
          <select class="form-select" name="is_active">
            <option value="1" {% if not row or row.is_active %}selected{% endif %}>Sí</option>
            <option value="0" {% if row and not row.is_active %}selected{% endif %}>No</option>
          </select>
        </div>

        <div class="full">
          <label class="form-label">Asunto</label>
          <input
            class="form-control"
            type="text"
            name="subject"
            value="{{ row.subject if row else '' }}"
          />
        </div>

        <div class="full">
          <label class="form-label">Cuerpo</label>
          <textarea
            class="form-control"
            name="body"
            rows="12"
            required
          >{{ row.body if row else '' }}</textarea>
          <div class="help">Podés usar placeholders como <code>{nombre}</code>.</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" type="submit">Guardar</button>
        <a class="btn btn-outline-secondary" href="/admin/templates">Cancelar</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
